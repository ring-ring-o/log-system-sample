# OpenTelemetry Collector 設定。
# アプリ(api/web)からの OTLP を受け、整形・バッチして配送する。
# ローカル確実観察のため debug/file exporter を常用し、SigNoz へは任意で転送する
# ([可観測性アーキテクチャ](../../docs/observability/observability-architecture.md))。

receivers:
  # api/web からの OTLP(トレース/メトリクス/ログ)を受信。
  # アプリのトレース/メトリクスは OTLP で届く。構造化ログ(JSON)はアプリの標準出力に出るため、
  # 本番でコンテナログを集約する場合は別途 stdout を tail する agent(filelog/fluentbit 等)を
  # 用いる(12-factor)。ローカルでは `docker logs` / コンソールで観察する。
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # メモリ保護(過負荷時のドロップ)。
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
  # 収集経路を識別する運用属性を付与。
  resource:
    attributes:
      - key: collector.name
        value: flownote-otel-collector
        action: upsert
  # 送信効率化のためのバッチ。
  batch:
    timeout: 5s
  # tail-based sampling: トレース全体を見てから保持を判断する。エラー/高レイテンシは必ず残し、
  # 正常 trace は確率的に間引く。ヘッド(SDK)サンプリングと併用する場合、エラーを確実に保持
  # するにはアプリ側を 100%(FLOWNOTE_TRACE_RATIO=1.0)にして判断を本処理に委ねるのが望ましい
  # ([ログ規約] §8 / [ADR 0005](../../docs/adr/0005-log-transport.md))。
  tail_sampling:
    decision_wait: 5s
    num_traces: 50000
    expected_new_traces_per_sec: 100
    policies:
      # 1) エラーを含む trace は常に保持(アラート/障害解析の最重要データ)。
      - name: keep-errors
        type: status_code
        status_code:
          status_codes: [ERROR]
      # 2) 高レイテンシ(1s 超)の trace は常に保持(性能劣化の検知)。
      - name: keep-slow
        type: latency
        latency:
          threshold_ms: 1000
      # 3) 残りは確率的に間引く(コスト制御)。
      - name: baseline-probabilistic
        type: probabilistic
        probabilistic:
          sampling_percentage: 10

exporters:
  # ローカル確実観察用(SigNoz が無くても相関を確認できる)。
  debug:
    verbosity: normal
  file:
    path: /var/log/otel/otel-output.jsonl
  # SigNoz へ転送する場合に有効化(--profile signoz)。
  otlp/signoz:
    endpoint: signoz-otel-collector:4317
    tls:
      insecure: true

service:
  # 既定では debug/file へ。SigNoz 起動時は各 exporters に otlp/signoz を追加する。
  pipelines:
    traces:
      # tail_sampling は完全な trace を見て判断するため batch の前に置く。
      receivers: [otlp]
      processors: [memory_limiter, resource, tail_sampling, batch]
      exporters: [debug, file]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [debug, file]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [debug, file]
  telemetry:
    logs:
      level: info
